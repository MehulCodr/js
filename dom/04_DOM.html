<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creation of elements</title>
</head>
<body>
    <ul class="parent">
        <li>Javascript</li>
    </ul>
    <script>
        const div = document.createElement('div');
        div.setAttribute("title" , "black");
        div.innerHTML = "Mehul";
        document.body.appendChild(div);
    </script>
</body>
</html>
